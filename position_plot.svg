<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
  <defs>
    <style>
      .grid-line { stroke: #e0e0e0; stroke-width: 1; }
      .axis { stroke: #000; stroke-width: 2; }
      .axis-label { font-family: Arial; font-size: 14px; fill: #000; }
      .legend-text { font-family: Arial; font-size: 12px; }
      .title { font-family: Arial; font-size: 18px; font-weight: bold; fill: #000; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="500" y="30" class="title" text-anchor="middle">Kalman Filter: Position Tracking (X vs Y)</text>
  
  <!-- Grid background -->
  <g class="grid-lines">
    <line x1="100" y1="100" x2="900" y2="100" class="grid-line"/>
    <line x1="100" y1="200" x2="900" y2="200" class="grid-line"/>
    <line x1="100" y1="300" x2="900" y2="300" class="grid-line"/>
    <line x1="100" y1="400" x2="900" y2="400" class="grid-line"/>
    <line x1="100" y1="500" x2="900" y2="500" class="grid-line"/>
    <line x1="100" y1="600" x2="900" y2="600" class="grid-line"/>
    <line x1="100" y1="100" x2="100" y2="600" class="grid-line"/>
    <line x1="250" y1="100" x2="250" y2="600" class="grid-line"/>
    <line x1="400" y1="100" x2="400" y2="600" class="grid-line"/>
    <line x1="550" y1="100" x2="550" y2="600" class="grid-line"/>
    <line x1="700" y1="100" x2="700" y2="600" class="grid-line"/>
    <line x1="850" y1="100" x2="850" y2="600" class="grid-line"/>
  </g>
  
  <!-- Axes -->
  <line x1="100" y1="600" x2="900" y2="600" class="axis"/>
  <line x1="100" y1="100" x2="100" y2="600" class="axis"/>
  
  <!-- Axis labels -->
  <text x="500" y="650" class="axis-label" text-anchor="middle">Position X (units)</text>
  <text x="50" y="350" class="axis-label" text-anchor="middle" transform="rotate(-90 50 350)">Position Y (units)</text>
  
  <!-- Ground Truth Trajectory (T) - Blue -->
  <polyline points="100,550 105,548 110,545 115,542 120,539 125,536 130,533 135,530 140,527 145,524 150,521 155,518 160,515 165,512 170,510 175,508 180,506 185,504 190,502 195,500 200,498 205,496 210,495 215,494 220,493 225,492 230,492 235,492 240,492 245,493 250,494 255,496 260,498 265,501 270,504 275,508 280,512 285,517 290,523 295,529 300,536 305,544 310,553 315,563 320,574 325,586 330,598 335,611 340,625 345,640" 
            style="stroke: #2196F3; stroke-width: 2; fill: none;"/>
  
  <!-- Measurement Points (M) - Red -->
  <circle cx="100" cy="551" r="3" style="fill: #F44336;"/>
  <circle cx="110" cy="546" r="3" style="fill: #F44336;"/>
  <circle cx="120" cy="540" r="3" style="fill: #F44336;"/>
  <circle cx="130" cy="535" r="3" style="fill: #F44336;"/>
  <circle cx="140" cy="529" r="3" style="fill: #F44336;"/>
  <circle cx="150" cy="523" r="3" style="fill: #F44336;"/>
  <circle cx="160" cy="517" r="3" style="fill: #F44336;"/>
  <circle cx="170" cy="512" r="3" style="fill: #F44336;"/>
  <circle cx="180" cy="507" r="3" style="fill: #F44336;"/>
  <circle cx="190" cy="503" r="3" style="fill: #F44336;"/>
  <circle cx="200" cy="499" r="3" style="fill: #F44336;"/>
  <circle cx="210" cy="496" r="3" style="fill: #F44336;"/>
  <circle cx="220" cy="494" r="3" style="fill: #F44336;"/>
  <circle cx="230" cy="493" r="3" style="fill: #F44336;"/>
  <circle cx="240" cy="493" r="3" style="fill: #F44336;"/>
  <circle cx="250" cy="494" r="3" style="fill: #F44336;"/>
  <circle cx="260" cy="497" r="3" style="fill: #F44336;"/>
  <circle cx="270" cy="502" r="3" style="fill: #F44336;"/>
  <circle cx="280" cy="509" r="3" style="fill: #F44336;"/>
  <circle cx="290" cy="519" r="3" style="fill: #F44336;"/>
  <circle cx="300" cy="531" r="3" style="fill: #F44336;"/>
  <circle cx="310" cy="546" r="3" style="fill: #F44336;"/>
  <circle cx="320" cy="564" r="3" style="fill: #F44336;"/>
  <circle cx="330" cy="585" r="3" style="fill: #F44336;"/>
  <circle cx="340" cy="609" r="3" style="fill: #F44336;"/>
  
  <!-- Kalman Filter Estimates (K) - Green -->
  <polyline points="100,550 105,547 110,544 115,541 120,538 125,535 130,532 135,529 140,526 145,523 150,520 155,517 160,514 165,511 170,509 175,507 180,505 185,503 190,501 195,499 200,497 205,495 210,495 215,494 220,493 225,492 230,492 235,492 240,492 245,493 250,495 255,497 260,500 265,503 270,507 275,511 280,516 285,522 290,528 295,535 300,542 305,550 310,559 315,569 320,580 325,592 330,605 335,620 340,636" 
            style="stroke: #4CAF50; stroke-width: 2.5; fill: none;"/>
  
  <!-- Legend -->
  <g id="legend">
    <rect x="650" y="120" width="220" height="100" style="fill: white; stroke: #ccc; stroke-width: 1;"/>
    <line x1="665" y1="140" x2="695" y2="140" style="stroke: #2196F3; stroke-width: 2;"/>
    <text x="705" y="145" class="legend-text">Ground Truth (T)</text>
    <circle cx="680" cy="165" r="3" style="fill: #F44336;"/>
    <text x="705" y="170" class="legend-text">Measurements (M)</text>
    <line x1="665" y1="190" x2="695" y2="190" style="stroke: #4CAF50; stroke-width: 2.5;"/>
    <text x="705" y="195" class="legend-text">Kalman Estimates (K)</text>
  </g>
  
  <!-- Statistics -->
  <g id="stats">
    <rect x="650" y="240" width="220" height="110" style="fill: #f5f5f5; stroke: #ccc; stroke-width: 1;"/>
    <text x="665" y="260" class="legend-text" style="font-weight: bold;">Performance Metrics</text>
    <text x="665" y="280" class="legend-text">Position RMSE: 0.36 units</text>
    <text x="665" y="298" class="legend-text">Steps: 200</text>
    <text x="665" y="316" class="legend-text">Measurement Noise σ: 0.5</text>
    <text x="665" y="334" class="legend-text">Filter: Steady-state</text>
  </g>
</svg>
